<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Mail Chat (Embedded)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc',
                400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca',
                800: '#3730a3', 900: '#312e81', 950: '#1e1b4b',
              },
            },
            boxShadow: {
              'soft': '0 2px 8px 0 rgba(0, 0, 0, 0.05)',
            },
          },
        },
      }
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/relativeTime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/calendar.min.js"></script>

    <style>
      [x-cloak] { display: none !important; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
      body { background-color: #0f172a; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.5); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.7); }

      .prose { max-width: none; }
      .prose h1 { font-size: 1.5em; font-weight: 700; margin: 0.5em 0 0.25em; }
      .prose h2 { font-size: 1.25em; font-weight: 600; margin: 0.5em 0 0.25em; }
      .prose h3 { font-size: 1.1em; font-weight: 600; margin: 0.5em 0 0.25em; }
      .prose p { margin: 0.5em 0; line-height: 1.6; }
      .prose a { color: #6366f1; text-decoration: underline; }
      .prose ul, .prose ol { margin: 0.5em 0; padding-left: 1.5em; }
      .prose li { margin: 0.25em 0; }
      .prose code {
        background: rgba(99, 102, 241, 0.15);
        padding: 0.1em 0.3em;
        border-radius: 3px;
        font-size: 0.85em;
        font-family: 'Consolas', 'Monaco', monospace;
      }
      .prose pre {
        background: #1e293b;
        padding: 0.75em;
        border-radius: 6px;
        overflow-x: auto;
        margin: 0.5em 0;
      }
      .prose pre code { background: transparent; padding: 0; color: #e2e8f0; }
      .prose blockquote {
        border-left: 3px solid #6366f1;
        padding-left: 0.75em;
        margin: 0.5em 0;
        color: #94a3b8;
      }

      .loading-dot { animation: loadPulse 1.4s infinite ease-in-out both; }
      .loading-dot:nth-child(1) { animation-delay: -0.32s; }
      .loading-dot:nth-child(2) { animation-delay: -0.16s; }
      @keyframes loadPulse {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
    </style>
  </head>

  <body>
    <div x-data="chatApp()" x-init="init()" class="h-screen flex flex-col bg-slate-900" x-cloak>

      <div class="flex flex-1 overflow-hidden">

        <!-- LEFT SIDEBAR -->
        <div class="w-72 flex-shrink-0 border-r border-slate-700 flex flex-col bg-slate-800"
             :class="{ 'hidden md:flex': activeThread }">

          <!-- Sidebar Header -->
          <div class="p-3 border-b border-slate-700">
            <div class="flex items-center justify-between mb-2">
              <h2 class="text-base font-bold text-white">Threads</h2>
              <span class="text-xs text-slate-400" x-text="filteredThreads.length + ' conversations'"></span>
            </div>

            <select x-model="selectedAgent"
                    @change="onAgentChange()"
                    class="w-full px-2 py-1.5 bg-slate-900 border border-slate-700 rounded-lg text-xs text-white focus:border-primary-500 focus:ring-1 focus:ring-primary-500 mb-2">
              <option value="">All agents</option>
              {% for a in agents %}
              <option value="{{ a.name }}" {% if selected_agent == a.name %}selected{% endif %}>{{ a.name }}</option>
              {% endfor %}
            </select>

            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-2 flex items-center pointer-events-none">
                <i data-lucide="search" class="w-3.5 h-3.5 text-slate-400"></i>
              </div>
              <input type="text"
                     x-model="searchQuery"
                     placeholder="Search..."
                     class="w-full pl-7 pr-3 py-1.5 bg-slate-900 border border-slate-700 rounded-lg text-xs text-white placeholder-slate-500 focus:border-primary-500 focus:ring-1 focus:ring-primary-500" />
            </div>
          </div>

          <!-- Thread List -->
          <div class="flex-1 overflow-y-auto">
            <template x-for="thread in filteredThreads" :key="thread.thread_id">
              <button @click="selectThread(thread)"
                      :class="{
                        'bg-primary-900/20 border-l-2 border-primary-500': activeThread && activeThread.thread_id === thread.thread_id,
                        'hover:bg-slate-700/50 border-l-2 border-transparent': !activeThread || activeThread.thread_id !== thread.thread_id
                      }"
                      class="w-full text-left px-3 py-2.5 border-b border-slate-700/50 transition-colors duration-150">
                <div class="flex items-start gap-2">
                  <div class="flex-shrink-0 mt-0.5">
                    <div :class="thread.is_group ? 'bg-primary-900/30 text-primary-400' : 'bg-slate-700 text-slate-300'"
                         class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold">
                      <template x-if="thread.is_group">
                        <i data-lucide="users" class="w-3.5 h-3.5"></i>
                      </template>
                      <template x-if="!thread.is_group">
                        <span x-text="thread.last_sender ? thread.last_sender.charAt(0).toUpperCase() : '#'"></span>
                      </template>
                    </div>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-0.5">
                      <span class="text-xs font-semibold text-white truncate" x-text="thread.display_name"></span>
                      <span class="text-[10px] text-slate-500 flex-shrink-0 ml-1" x-text="formatRelativeTime(thread.last_ts)"></span>
                    </div>
                    <p class="text-[10px] text-slate-400 truncate">
                      <span class="font-medium" x-text="thread.last_sender ? thread.last_sender + ': ' : ''"></span>
                      <span x-text="thread.last_subject"></span>
                    </p>
                    <template x-if="thread.unread_count > 0">
                      <span class="inline-block mt-0.5 min-w-[1rem] h-4 px-1 bg-primary-500 text-white text-[10px] font-bold rounded-full text-center leading-4"
                            x-text="thread.unread_count > 99 ? '99+' : thread.unread_count"></span>
                    </template>
                  </div>
                </div>
              </button>
            </template>

            <template x-if="filteredThreads.length === 0">
              <div class="flex flex-col items-center justify-center h-full p-6 text-center">
                <i data-lucide="message-square" class="w-6 h-6 text-slate-600 mb-2"></i>
                <p class="text-xs text-slate-500">No threads found</p>
              </div>
            </template>
          </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="flex-1 flex flex-col min-w-0 bg-slate-900"
             :class="{ 'hidden md:flex': !activeThread }">

          <template x-if="!activeThread">
            <div class="flex-1 flex flex-col items-center justify-center text-center p-6">
              <div class="w-14 h-14 bg-slate-800 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="message-circle" class="w-7 h-7 text-slate-600"></i>
              </div>
              <h3 class="text-base font-bold text-white mb-1">Select a conversation</h3>
              <p class="text-xs text-slate-400 max-w-xs">Choose a thread from the sidebar to view messages.</p>
            </div>
          </template>

          <template x-if="activeThread">
            <div class="flex flex-col h-full">
              <!-- Chat Header -->
              <div class="flex-shrink-0 px-4 py-3 border-b border-slate-700 bg-slate-800">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-2 min-w-0">
                    <button @click="activeThread = null; activeMessages = []"
                            class="md:hidden flex-shrink-0 p-1 rounded-lg hover:bg-slate-700">
                      <i data-lucide="arrow-left" class="w-4 h-4 text-slate-300"></i>
                    </button>
                    <div :class="activeThread.is_group ? 'bg-primary-900/30 text-primary-400' : 'bg-slate-700 text-slate-300'"
                         class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0">
                      <template x-if="activeThread.is_group"><i data-lucide="users" class="w-4 h-4"></i></template>
                      <template x-if="!activeThread.is_group">
                        <span class="text-xs font-bold" x-text="activeThread.last_sender ? activeThread.last_sender.charAt(0).toUpperCase() : '#'"></span>
                      </template>
                    </div>
                    <div class="min-w-0">
                      <h3 class="text-sm font-bold text-white truncate" x-text="activeThread.display_name"></h3>
                      <p class="text-[10px] text-slate-400 truncate" x-text="activeThread.participants_text"></p>
                    </div>
                  </div>
                  <span class="text-[10px] text-slate-500 font-mono" x-text="activeMessages.length + ' msgs'"></span>
                </div>
              </div>

              <!-- Messages -->
              <div class="flex-1 overflow-y-auto px-4 py-3 space-y-1" x-ref="messagesContainer">
                <template x-for="(msg, index) in activeMessages" :key="msg.id">
                  <div>
                    <template x-if="index === 0 || !isSameDay(msg.created, activeMessages[index - 1].created)">
                      <div class="flex items-center justify-center my-3">
                        <div class="px-2 py-0.5 bg-slate-700 rounded-full">
                          <span class="text-[10px] font-medium text-slate-400" x-text="formatDateSeparator(msg.created)"></span>
                        </div>
                      </div>
                    </template>

                    <div class="flex mb-2" :class="isOwnMessage(msg) ? 'justify-end' : 'justify-start'">
                      <div class="flex gap-1.5 max-w-[80%]" :class="isOwnMessage(msg) ? 'flex-row-reverse' : 'flex-row'">
                        <template x-if="!isOwnMessage(msg) && (index === 0 || activeMessages[index - 1].sender !== msg.sender || !isSameDay(msg.created, activeMessages[index - 1].created))">
                          <div class="flex-shrink-0 mt-0.5">
                            <div class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold"
                                 :style="'background-color: ' + getAgentColor(msg.sender) + '20; color: ' + getAgentColor(msg.sender)">
                              <span x-text="msg.sender.charAt(0).toUpperCase()"></span>
                            </div>
                          </div>
                        </template>
                        <template x-if="isOwnMessage(msg) || (index > 0 && activeMessages[index - 1].sender === msg.sender && isSameDay(msg.created, activeMessages[index - 1].created))">
                          <div class="w-6 flex-shrink-0"></div>
                        </template>

                        <div>
                          <template x-if="!isOwnMessage(msg) && (index === 0 || activeMessages[index - 1].sender !== msg.sender || !isSameDay(msg.created, activeMessages[index - 1].created))">
                            <p class="text-[10px] font-semibold mb-0.5 px-0.5"
                               :style="'color: ' + getAgentColor(msg.sender)"
                               x-text="msg.sender"></p>
                          </template>

                          <div :class="isOwnMessage(msg)
                                  ? 'bg-primary-600 text-white rounded-2xl rounded-br-md'
                                  : 'bg-slate-700 text-white rounded-2xl rounded-bl-md'"
                               class="px-3 py-2 shadow-sm">
                            <template x-if="msg.subject && msg.subject !== activeThread.display_name">
                              <p class="text-[10px] font-bold mb-0.5 opacity-80" x-text="msg.subject"></p>
                            </template>
                            <template x-if="msg.importance === 'high' || msg.importance === 'urgent'">
                              <span :class="isOwnMessage(msg) ? 'bg-white/20 text-white' : 'bg-red-900/30 text-red-400'"
                                    class="inline-block text-[9px] font-bold px-1 py-0.5 rounded mb-0.5"
                                    x-text="msg.importance.toUpperCase()"></span>
                            </template>
                            <div class="text-xs leading-relaxed prose-sm break-words prose prose-invert"
                                 x-html="renderMarkdown(msg.body_md)"></div>
                            <p class="text-[9px] mt-0.5 text-right"
                               :class="isOwnMessage(msg) ? 'text-white/60' : 'text-slate-500'"
                               x-text="formatMessageTime(msg.created)"></p>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>

                <template x-if="loadingMessages">
                  <div class="flex items-center justify-center py-6">
                    <div class="flex items-center gap-2 text-slate-500">
                      <div class="loading-dot w-1.5 h-1.5 bg-slate-500 rounded-full"></div>
                      <div class="loading-dot w-1.5 h-1.5 bg-slate-500 rounded-full"></div>
                      <div class="loading-dot w-1.5 h-1.5 bg-slate-500 rounded-full"></div>
                    </div>
                  </div>
                </template>

                <template x-if="!loadingMessages && activeMessages.length === 0">
                  <div class="flex flex-col items-center justify-center h-full text-center">
                    <p class="text-xs text-slate-500">No messages in this thread</p>
                  </div>
                </template>
              </div>

              <!-- Compose (read-only) -->
              <div class="flex-shrink-0 px-4 py-2 border-t border-slate-700 bg-slate-800">
                <div class="flex items-center gap-2">
                  <textarea rows="1" placeholder="Read-only view" disabled
                            class="flex-1 px-3 py-1.5 bg-slate-900 border border-slate-700 rounded-lg text-xs text-slate-500 placeholder-slate-600 resize-none cursor-not-allowed"></textarea>
                  <button disabled class="p-2 bg-slate-700 rounded-lg cursor-not-allowed">
                    <i data-lucide="send" class="w-3.5 h-3.5 text-slate-500"></i>
                  </button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <script>
      function chatApp() {
        const allThreads = {{ threads | tojson }};
        const allMessages = {{ all_messages | tojson }};
        const agents = {{ agents | tojson }};
        const projectSlug = {{ project.slug | tojson }};
        const initialAgent = {{ selected_agent | tojson }};

        const agentColors = {};
        const colorPalette = [
          '#6366f1', '#8b5cf6', '#ec4899', '#ef4444', '#f59e0b',
          '#10b981', '#06b6d4', '#3b82f6', '#f97316', '#84cc16',
          '#14b8a6', '#a855f7', '#e11d48', '#0891b2', '#65a30d'
        ];

        return {
          searchQuery: '',
          selectedAgent: initialAgent || '',
          activeThread: null,
          activeMessages: [],
          loadingMessages: false,
          projectSlug: projectSlug,

          init() {
            agents.forEach((a, i) => {
              agentColors[a.name] = colorPalette[i % colorPalette.length];
            });

            if (window.dayjs) {
              dayjs.extend(dayjs_plugin_relativeTime);
              dayjs.extend(dayjs_plugin_calendar);
            }

            const hash = window.location.hash.replace('#', '');
            if (hash) {
              const found = allThreads.find(t => t.thread_id === hash);
              if (found) {
                this.$nextTick(() => this.selectThread(found));
              }
            }

            this.$nextTick(() => {
              if (window.lucide) lucide.createIcons();
            });

            // Refresh messages every 10s
            setInterval(() => this.refreshMessages(), 10000);
          },

          async refreshMessages() {
            try {
              const agent = this.selectedAgent ? '&agent=' + encodeURIComponent(this.selectedAgent) : '';
              // Silent background refresh -- for now just re-init lucide
              if (window.lucide) lucide.createIcons();
            } catch (e) {}
          },

          get filteredThreads() {
            let threads = allThreads;
            if (this.searchQuery.trim()) {
              const q = this.searchQuery.toLowerCase();
              threads = threads.filter(t =>
                (t.display_name || '').toLowerCase().includes(q) ||
                (t.last_subject || '').toLowerCase().includes(q) ||
                (t.last_sender || '').toLowerCase().includes(q) ||
                (t.thread_id || '').toLowerCase().includes(q)
              );
            }
            return threads;
          },

          selectThread(thread) {
            this.activeThread = thread;
            this.loadingMessages = true;
            window.location.hash = thread.thread_id;

            this.$nextTick(() => {
              this.activeMessages = allMessages.filter(m =>
                m.thread_id === thread.thread_id
              ).sort((a, b) => new Date(a.created).getTime() - new Date(b.created).getTime());
              this.loadingMessages = false;

              this.$nextTick(() => {
                this.scrollToBottom();
                if (window.lucide) lucide.createIcons();
              });
            });
          },

          scrollToBottom() {
            const container = this.$refs.messagesContainer;
            if (container) container.scrollTop = container.scrollHeight;
          },

          onAgentChange() {
            const base = window.location.pathname;
            if (this.selectedAgent) {
              window.location.href = base + '?embed=true&agent=' + encodeURIComponent(this.selectedAgent);
            } else {
              window.location.href = base + '?embed=true';
            }
          },

          isOwnMessage(msg) {
            return this.selectedAgent && msg.sender === this.selectedAgent;
          },

          getAgentColor(name) {
            return agentColors[name] || '#6366f1';
          },

          formatRelativeTime(ts) {
            if (!ts || !window.dayjs) return '';
            const d = dayjs(ts);
            const now = dayjs();
            const diffDays = now.diff(d, 'day');
            if (diffDays === 0) return d.format('HH:mm');
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return d.format('ddd');
            return d.format('MMM D');
          },

          formatMessageTime(ts) {
            if (!ts || !window.dayjs) return '';
            return dayjs(ts).format('HH:mm');
          },

          formatDateSeparator(ts) {
            if (!ts || !window.dayjs) return '';
            const d = dayjs(ts);
            const now = dayjs();
            const diffDays = now.diff(d, 'day');
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            return d.format('MMMM D, YYYY');
          },

          isSameDay(ts1, ts2) {
            if (!ts1 || !ts2 || !window.dayjs) return false;
            return dayjs(ts1).format('YYYY-MM-DD') === dayjs(ts2).format('YYYY-MM-DD');
          },

          renderMarkdown(md) {
            if (!md) return '';
            try {
              const html = marked.parse(md, { breaks: true, gfm: true });
              return DOMPurify.sanitize(html);
            } catch (e) {
              const div = document.createElement('div');
              div.textContent = md;
              return div.innerHTML;
            }
          }
        };
      }
    </script>
  </body>
</html>
